body:
  text: 藥録檳榔一名賓門菥蓂一名折目一名榮冥一名馬駒石流黃味酸生谷中治婦人陰蝕疽痔作金銀物生東海石流青白色主益肝氣明目石流赤生羌道山谷陽起石一名白石味酸微溫生山谷治崩中補足肉攣藏中血結氣寒熱腸痛漏下無子陰陽不合生齊地陽起石神農扁鵲酸無毒桐君雷公岐伯無毒李氏小寒或生太山或陽起山採無時薔蘼虋冬也冬之山草多虋冬赤須子豐人好食天門冬齒落更生甘始者太原人服天門冬在人間三百餘年天門冬莖間有茨而葉滑曰郗體一名顛朿根以浣縑素白越人名為浣草似天門冬而非也凡服此見試浣衣如法者便非天門冬杜子服天門冬御十八妾有子百四十人日行三百里石膽一名畢石一名君石出秦州羌道山谷大石間或出句青山其為石也青色多白文易破狀如空青能化鐵為銅合名金銀煉餌食之不老石肺一名石肝黑澤有赤文如肺肝置水中即乾濡生益氣明目生水中石脾一名胃口一名胃石一名腎石赤文治胃中寒熱
